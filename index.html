<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login EcoPneu</title>
  

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e7d32, #43a047);
    }

    .login-box{
      background: white;
      padding: 40px;
      width: 350px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    .login-box h1{
      text-align: center;
      margin-bottom: 25px;
      color: #1e7d32;
    }

    .input-group{
      margin-bottom: 20px;
    }

    .input-group label{
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .input-group input{
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    .input-group input:focus{
      border-color: #1e7d32;
    }

    button{
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #1e7d32;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover{
      background: #166628;
    }

    .mensagem{
      text-align: center;
      margin-top: 15px;
      color: red;
    }
    body{
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background-image: url("ifpi.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

  </style>
</head>

<body>

  <div class="login-box">

    <h1>EcoPneu Login</h1>

    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Digite seu email">
    </div>

    <div class="input-group">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="Digite sua senha">
    </div>

    <button onclick="fazerLogin()">
      Entrar
    </button>

    <p class="mensagem" id="mensagem"></p>

  </div>

  <script>

    function fazerLogin(){

      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      if(email === "ifpi123@gmail.com" && senha === "1234"){

        alert("Login realizado com sucesso!");

        window.open("compra.html");

      }else{

        document.getElementById("mensagem").innerText =
        "Email ou senha incorretos";

      }

    }

  </script>

</body>
</html>
